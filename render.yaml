services:
  - type: web
    name: chess-tournament-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false          # You set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # Set to your Netlify URL after deploying frontend
      - key: NODE_ENV
        value: production
